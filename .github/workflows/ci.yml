name: 🚀 Production CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  quality-gate:
    name: 🛡️ Quality Gate (Lint, Type, Test)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: 🚀 Set up uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"

    - name: 🐍 Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        uv pip install --system ruff mypy pytest pytest-cov
        if [ -f pyproject.toml ]; then uv pip install --system .; fi

    - name: 🧹 Lint with Ruff
      run: ruff check .

    - name: 📏 Format with Ruff
      run: ruff format --check .

    - name: 🧐 Type check with Mypy
      run: mypy . --ignore-missing-imports

    - name: 🧪 Run tests with coverage
      run: |
        pytest tests/ --cov=orchestration --cov=rag --cov=safety --cov-report=xml

    - name: 📊 Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

  research-eval:
    name: 🧬 Elite Notebooks Smoke Test
    runs-on: ubuntu-latest
    needs: quality-gate
    
    steps:
    - uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        pip install -r requirements.txt || echo "No requirements.txt found, skipping."
        pip install papermill jupyter

    - name: 🧪 Run Elite Notebooks smoke test
      run: |
        # Run all notebooks in experiments folder
        for nb in experiments/*.ipynb; do
          if [ -f "$nb" ]; then
            echo "Executing $nb"
            papermill "$nb" /tmp/output.ipynb --kernel python3 || echo "$nb execution skipped for missing dependencies"
          fi
        done
