```yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0  # Use the latest stable revision
    hooks:
      - id: trailing-whitespace  # Trims trailing whitespace
      - id: end-of-file-fixer  # Ensures a newline at the end of files
      - id: check-yaml  # Validates YAML files
      - id: check-merge-conflict  # Checks for merge conflict strings

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6  # Use the latest stable revision
    hooks:
      - id: ruff  # Lints Python code using Ruff
        args: [--fix]  # Automatically fix issues when possible
      - id: ruff-format  # Formats Python code using Ruff

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0  # Use the latest stable revision
    hooks:
      - id: mypy  # Static type checker for Python
        args: [--ignore-missing-imports]  # Ignore missing imports during type checking
```