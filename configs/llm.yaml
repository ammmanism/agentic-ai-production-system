# LLM (Large Language Model) Configuration
# This file contains settings for LLM providers, model selection, and generation parameters.

llm:
  # Primary LLM Provider Configuration
  primary:
    # Provider name: "openai", "anthropic", "azure", "local"
    provider: openai
    # Model identifier
    model: gpt-4-turbo-preview
    # API key environment variable name
    api_key_env: OPENAI_API_KEY
    # Base URL for API (optional, for custom endpoints)
    base_url: null
    # Request timeout in seconds
    timeout_seconds: 30

  # Model Fallback Chain
  # If primary model fails, fall back through this list
  fallback:
    enabled: true
    # Maximum number of retry attempts per model
    max_retries_per_model: 2
    # Models to try in order (primary should be first)
    models:
      - name: gpt-4-turbo-preview
        provider: openai
        priority: 1
        weight: 1.0
      - name: gpt-4
        provider: openai
        priority: 2
        weight: 0.8
      - name: claude-3-sonnet-20240229
        provider: anthropic
        priority: 3
        weight: 0.6
      - name: claude-3-haiku-20240307
        provider: anthropic
        priority: 4
        weight: 0.4
    # Backoff strategy: "exponential", "linear", "fixed"
    backoff_strategy: exponential
    # Initial delay between retries in milliseconds
    initial_delay_ms: 500
    # Maximum delay between retries in milliseconds
    max_delay_ms: 10000

  # Generation Parameters
  generation:
    # Temperature for sampling (0.0 to 2.0)
    temperature: 0.7
    # Top-p (nucleus sampling)
    top_p: 0.95
    # Frequency penalty (-2.0 to 2.0)
    frequency_penalty: 0.0
    # Presence penalty (-2.0 to 2.0)
    presence_penalty: 0.0
    # Maximum tokens to generate
    max_tokens: 2048
    # Stop sequences
    stop_sequences: []
    # Log probabilities (number of top alternatives to return)
    logprobs: null
    # Seed for reproducible outputs (null for random)
    seed: null

  # System Prompts
  prompts:
    # Default system prompt for chat interactions
    default_system: |
      You are a helpful AI assistant powered by a sophisticated language model.
      Provide accurate, thoughtful, and well-reasoned responses.
      When answering questions based on retrieved context, cite your sources clearly.
      If you're unsure about something, acknowledge uncertainty rather than guessing.

    # System prompt for RAG-based responses
    rag_system: |
      You are an AI assistant that answers questions based on the provided context.
      Guidelines:
      - Use ONLY the information from the provided context to answer questions
      - Cite specific sources when making claims
      - If the context doesn't contain enough information, say so clearly
      - Do not make up facts or use outside knowledge
      - Be concise but thorough

    # System prompt for creative tasks
    creative_system: |
      You are a creative AI assistant. Feel free to be imaginative and original.
      Generate engaging, creative content while maintaining coherence and quality.

  # Rate Limiting per Provider
  rate_limits:
    openai:
      # Requests per minute
      rpm: 1000
      # Tokens per minute
      tpm: 100000
      # Requests per day
      rpd: 10000
    anthropic:
      rpm: 50
      tpm: 50000
      rpd: null
    azure:
      rpm: 120
      tpm: 120000
      rpd: null

  # Token Counting
  token_counting:
    # Method: "tiktoken", "huggingface", "character_approximation"
    method: tiktoken
    # Cache token counts
    cache_enabled: true
    # Warn when approaching context limit (percentage)
    warning_threshold: 0.85
    # Maximum context window size
    max_context_window: 128000

  # Streaming Configuration
  streaming:
    # Enable streaming responses
    enabled: true
    # Chunk size for streaming (tokens)
    chunk_size: 3
    # Time between chunks in milliseconds
    chunk_interval_ms: 50
    # Send typing indicators
    send_typing_indicator: false

  # Logging and Debugging
  logging:
    # Log all requests and responses
    log_requests: true
    # Log token usage
    log_token_usage: true
    # Log latency metrics
    log_latency: true
    # Redact sensitive information
    redact_sensitive: true
    # Sensitive fields to redact
    sensitive_fields:
      - api_key
      - authorization
      - password

  # Cost Tracking
  cost_tracking:
    # Enable cost calculation
    enabled: true
    # Price per 1K input tokens (USD)
    input_price_per_1k:
      gpt-4-turbo-preview: 0.01
      gpt-4: 0.03
      claude-3-sonnet-20240229: 0.003
      claude-3-haiku-20240307: 0.00025
    # Price per 1K output tokens (USD)
    output_price_per_1k:
      gpt-4-turbo-preview: 0.03
      gpt-4: 0.06
      claude-3-sonnet-20240229: 0.015
      claude-3-haiku-20240307: 0.00125
