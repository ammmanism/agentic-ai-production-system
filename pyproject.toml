```toml
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-ai-production-system"
version = "0.1.0"
description = "Production-grade agentic AI system: LangGraph orchestration, hybrid RAG, safety guardrails (PII/toxicity/injection), RAGAS evaluation, Prometheus + Langfuse observability, Kubernetes deployment with HPA, and human-in-the-loop."
authors = [
    { name = "Your Name", email = "your.email@example.com" }
]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.0.1",
    "langchain>=0.0.1",
    "fastapi>=0.95.0",
    "faiss-cpu>=1.7.4",
    "redis>=4.5.4",
    "qdrant-client>=1.1.0",
    "prometheus-client>=0.16.0",
    "opentelemetry-api>=1.15.0",
    "opentelemetry-sdk>=1.15.0",
    "opentelemetry-exporter-prometheus>=1.15.0",
    "langfuse>=0.0.1",
    "docker>=6.0.1",
    "kubernetes>=26.1.0",
    "terraform>=1.3.0",
    "uvicorn>=0.21.1",
    "python-dotenv>=1.0.0",
    "pydantic>=1.10.7",
    "python-multipart>=0.0.6",
    "ragas>=0.0.1",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.0.261",
    "mypy>=1.2.0",
    "types-redis>=4.5.4.1",
    "types-python-dateutil>=2.8.19.12",
    "types-pytz>=2023.3.0.0",
    "types-requests>=2.28.11.12",
    "types-urllib3>=1.26.25.10",
]
test = [
    "pytest>=7.3.1",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "httpx>=0.23.3",
]
docs = [
    "mkdocs>=1.4.2",
    "mkdocs-material>=9.1.5",
    "mkdocstrings[python]>=0.20.0",
]

[project.scripts]
agentic-ai-production-system = "agentic_ai_production_system.cli:main"

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "UP"]

[tool.mypy]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.report]
fail_under = 80
```